# Configuración de la aplicación Spring Boot
# La Esperanza - Backend API

# ============================================================
# INFORMACIÓN DE LA APLICACIÓN
# ============================================================
spring.application.name=la-esperanza-backend
server.servlet.context-path=/api
server.port=8080

# ============================================================
# BASE DE DATOS
# ============================================================
# PostgreSQL (producción)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:la_esperanza}
spring.datasource.username=${DB_USER:la_esperanza_user}
spring.datasource.password=${DB_PASSWORD:Eva01369}

# H2 (desarrollo/testing)
# spring.datasource.url=jdbc:h2:mem:testdb
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Flyway Migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=false

# Logging para SQL
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================================
# SEGURIDAD & JWT
# ============================================================
jwt.secret=${JWT_SECRET:tu-clave-secreta-muy-larga-y-segura-min-32-caracteres}
jwt.expiration=${JWT_EXPIRATION:1800000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ============================================================
# CORS
# ============================================================
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,https://usuario.github.io}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

# ============================================================
# LOGGING
# ============================================================
logging.level.root=INFO
logging.level.com.laesperanza=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.level.org.springframework.security=TRACE


# ============================================================
# ACTUATOR (Monitoreo)
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# ============================================================
# SWAGGER / OPENAPI
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ============================================================
# CONEXIÓN POOL (HikariCP)
# ============================================================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ============================================================
# FILE UPLOAD
# ============================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# SERIALIZACIÓN JSON
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null

# ============================================================
# COMPRESIÓN
# ============================================================
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript

# ============================================================
# CACHE
# ============================================================
spring.cache.type=simple

# ============================================================
# TIMEZONE
# ============================================================
spring.jackson.time-zone=America/Guatemala
