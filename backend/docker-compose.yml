services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: la-esperanza-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-la_esperanza}
      PGTZ: 'America/Guatemala'
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - la-esperanza-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend Spring Boot
  backend:
    image: la-esperanza/backend:1.0.0
    container_name: la-esperanza-api
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-la_esperanza}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-la_esperanza}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-tu-clave-secreta-muy-larga-y-segura-min-32-caracteres}
      JWT_EXPIRATION: 1800000
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,https://alleneh.github.io,https://sistema-la-esperanza.online,https://www.sistema-la-esperanza.online
      JAVA_OPTS: "-Xmx512m -Xms256m"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - la-esperanza-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Frontend Nginx
  frontend:
    image: nginx:alpine
    container_name: la-esperanza-frontend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../index.html:/usr/share/nginx/html/index.html:ro
      - ../css:/usr/share/nginx/html/css:ro
      - ../js:/usr/share/nginx/html/js:ro
      - ../data:/usr/share/nginx/html/data:ro
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - la-esperanza-network
    environment:
      API_URL: http://backend:8080/api
    restart: unless-stopped

  # pgAdmin (solo en desarrollo)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: la-esperanza-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@laesperanza.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - la-esperanza-network
    restart: unless-stopped
    profiles:
      - dev

volumes:
  postgres_data:
    driver: local

networks:
  la-esperanza-network:
    driver: bridge